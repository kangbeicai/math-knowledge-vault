<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc"><title id="title">Pullback of differential forms and Stokes theorem</title><desc id="desc">The left panel shows a form pulling back against the direction of a parameterization. The right panel shows an oriented manifold and its induced boundary orientation.</desc><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#334155"/></marker><marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#ea580c"/></marker><marker id="b" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#2563eb"/></marker><style>.t{font:700 34px Arial,sans-serif;fill:#172033}.l{font:600 25px Arial,sans-serif;fill:#172033}.s{font:20px Arial,sans-serif;fill:#334155}.m{font:italic 24px Georgia,serif;fill:#172033}.thin{stroke:#94a3b8;stroke-width:2.5}.line{fill:none;stroke:#334155;stroke-width:4;stroke-linecap:round}</style></defs><rect width="1200" height="700" fill="white"/><text x="600" y="50" text-anchor="middle" class="t">Pullback of forms and Stokes theorem</text><line x1="600" y1="85" x2="600" y2="650" class="thin"/><text x="300" y="110" text-anchor="middle" class="l">A. Pullback reverses direction</text><rect x="65" y="200" width="190" height="220" rx="20" fill="#f8fafc" stroke="#64748b" stroke-width="3"/><text x="160" y="180" text-anchor="middle" class="m">U in R^k</text><path d="M95 360C115 270 205 250 225 335" fill="none" stroke="#ea580c" stroke-width="4"/><text x="160" y="330" text-anchor="middle" class="m">phi*omega</text><path d="M290 300C375 210 440 210 520 300" class="line" marker-end="url(#a)"/><text x="405" y="205" text-anchor="middle" class="m">phi</text><path d="M520 390C440 475 375 475 290 390" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#o)"/><text x="405" y="500" text-anchor="middle" class="m">pullback phi*</text><path d="M420 250C470 170 565 195 555 300C545 405 440 455 390 360C350 285 370 245 420 250Z" fill="#d1fae5" stroke="#059669" stroke-width="3"/><text x="480" y="180" text-anchor="middle" class="m">M</text><text x="475" y="320" text-anchor="middle" class="m">omega</text><text x="300" y="575" text-anchor="middle" class="s">Forms pull back so they can act on source vectors.</text><text x="900" y="110" text-anchor="middle" class="l">B. Stokes: interior and boundary</text><path d="M690 225C760 145 1050 155 1110 300C1165 430 1015 555 830 515C675 482 620 325 690 225Z" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><path d="M715 250C790 185 1030 190 1080 315C1120 415 995 500 845 475C720 455 665 335 715 250Z" fill="none" stroke="#64748b" stroke-width="2.5"/><path d="M720 250C850 150 1030 195 1090 300" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#b)"/><path d="M1080 405C970 525 780 500 700 370" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#b)"/><text x="895" y="330" text-anchor="middle" class="m">M</text><text x="1040" y="210" class="m">boundary M</text><text x="900" y="565" text-anchor="middle" class="m">integral_M d omega = integral_boundary omega</text><text x="900" y="615" text-anchor="middle" class="s">The boundary orientation is induced by the orientation of M.</text></svg>