<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc"><title id="title">Immersion, submersion, and embedding</title><desc id="desc">Three panels compare an immersion with self-intersection, a submersion as projection, and an embedding without global identification.</desc><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#334155"/></marker><marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#ea580c"/></marker><style>.t{font:700 34px Arial,sans-serif;fill:#172033}.l{font:600 25px Arial,sans-serif;fill:#172033}.s{font:20px Arial,sans-serif;fill:#334155}.q{font:17px Arial,sans-serif;fill:#475569}.line{fill:none;stroke:#334155;stroke-width:4;stroke-linecap:round}.thin{stroke:#94a3b8;stroke-width:2}.blue{fill:none;stroke:#2563eb;stroke-width:5}.purple{fill:none;stroke:#7c3aed;stroke-width:6}</style></defs><rect width="1200" height="700" fill="white"/><text x="600" y="50" text-anchor="middle" class="t">Immersion, submersion, and embedding</text><line x1="400" y1="85" x2="400" y2="630" class="thin"/><line x1="800" y1="85" x2="800" y2="630" class="thin"/><text x="200" y="110" text-anchor="middle" class="l">Immersion</text><circle cx="125" cy="230" r="70" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><path d="M205 230C245 145 345 145 345 230C345 315 245 315 205 230C165 145 265 145 305 230C345 315 245 315 205 230Z" class="blue"/><path d="M185 230H210" class="line" marker-end="url(#a)"/><circle cx="275" cy="230" r="6" fill="#172033"/><text x="200" y="365" text-anchor="middle" class="s">dF_p injective</text><text x="200" y="400" text-anchor="middle" class="q">Local directions survive; the image may self-intersect.</text><text x="600" y="110" text-anchor="middle" class="l">Submersion</text><rect x="460" y="160" width="280" height="220" rx="15" fill="#ffedd5" stroke="#ea580c" stroke-width="3"/><line x1="500" y1="430" x2="700" y2="430" class="line"/><path d="M520 210V410M580 190V410M640 205V410M700 185V410" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#o)"/><text x="600" y="485" text-anchor="middle" class="s">dF_p surjective</text><text x="600" y="520" text-anchor="middle" class="q">A higher-dimensional domain projects onto the target.</text><text x="1000" y="110" text-anchor="middle" class="l">Embedding</text><circle cx="900" cy="230" r="70" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/><ellipse cx="1050" cy="240" rx="115" ry="75" class="purple"/><path d="M970 230H935" class="line" marker-end="url(#a)"/><text x="1000" y="365" text-anchor="middle" class="s">Immersion + homeomorphism onto image</text><text x="1000" y="400" text-anchor="middle" class="q">No local collapse and no global identification.</text><text x="600" y="600" text-anchor="middle" class="s">Immersion is local injectivity; submersion is local surjectivity; embedding is also globally faithful.</text></svg>