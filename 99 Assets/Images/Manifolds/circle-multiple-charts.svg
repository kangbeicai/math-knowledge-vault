<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc"><title id="title">Why the circle needs multiple charts</title><desc id="desc">Two circle charts remove different points and map the remaining arcs to the real line.</desc><defs><marker id="b" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#2563eb"/></marker><marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#ea580c"/></marker><style>.t{font:700 34px Arial,sans-serif;fill:#172033}.s{font:20px Arial,sans-serif;fill:#334155}.m{font:italic 24px Georgia,serif;fill:#172033}.line{fill:none;stroke:#334155;stroke-width:4;stroke-linecap:round}</style></defs><rect width="1200" height="700" fill="white"/><text x="600" y="58" text-anchor="middle" class="t">Why S^1 needs multiple charts</text><circle cx="300" cy="340" r="180" class="line"/><path d="M300 160A180 180 0 0 1 300 520" fill="none" stroke="#2563eb" stroke-width="12"/><path d="M300 520A180 180 0 0 1 300 160" fill="none" stroke="#ea580c" stroke-width="12"/><circle cx="120" cy="340" r="10" fill="#ea580c"/><circle cx="480" cy="340" r="10" fill="#2563eb"/><text x="95" y="325" class="m">a</text><text x="495" y="325" class="m">b</text><text x="300" y="585" text-anchor="middle" class="s">U1 = S^1 minus {a}; U2 = S^1 minus {b}</text><path d="M515 250C610 195 660 185 735 210" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#b)"/><path d="M515 430C610 485 660 495 735 470" fill="none" stroke="#ea580c" stroke-width="4" marker-end="url(#o)"/><line x1="770" y1="235" x2="1110" y2="235" class="line"/><line x1="770" y1="465" x2="1110" y2="465" class="line"/><circle cx="940" cy="235" r="7" fill="#2563eb"/><circle cx="940" cy="465" r="7" fill="#ea580c"/><text x="940" y="205" text-anchor="middle" class="m">phi1(U1) in R</text><text x="940" y="435" text-anchor="middle" class="m">phi2(U2) in R</text><text x="600" y="645" text-anchor="middle" class="s">Each chart removes one point; overlap data glues the local coordinates.</text></svg>