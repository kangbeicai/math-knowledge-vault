<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc"><title id="title">Local chart of a manifold</title><desc id="desc">A patch U of a manifold M is mapped by phi to an open coordinate image in Euclidean space.</desc><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#334155"/></marker><style>.t{font:700 34px Arial,sans-serif;fill:#172033}.l{font:600 25px Arial,sans-serif;fill:#172033}.s{font:20px Arial,sans-serif;fill:#334155}.m{font:italic 24px Georgia,serif;fill:#172033}.mfd{fill:#dbeafe;stroke:#2563eb;stroke-width:4}.patch{fill:#ffedd5;stroke:#ea580c;stroke-width:4}.box{fill:#f8fafc;stroke:#64748b;stroke-width:4}.line{fill:none;stroke:#334155;stroke-width:4;stroke-linecap:round}</style></defs><rect width="1200" height="700" fill="white"/><text id="titleText" x="600" y="58" text-anchor="middle" class="t">Local chart: manifold patch and coordinate image</text><text x="245" y="120" text-anchor="middle" class="l">Manifold M</text><path d="M75 420C120 235 340 175 470 285C560 360 500 525 320 560C170 590 45 520 75 420Z" class="mfd"/><path d="M165 405C190 315 310 275 390 330C445 370 420 455 335 485C245 515 145 475 165 405Z" class="patch"/><text x="290" y="395" text-anchor="middle" class="m">U in M</text><circle cx="305" cy="420" r="8" fill="#172033"/><text x="322" y="410" class="m">p</text><path d="M510 365C610 270 690 270 780 350" class="line" marker-end="url(#a)"/><text x="645" y="265" text-anchor="middle" class="m">phi</text><text x="955" y="120" text-anchor="middle" class="l">Euclidean space R^n</text><rect x="785" y="180" width="340" height="390" rx="20" class="box"/><path d="M845 410C855 305 995 260 1060 335C1115 400 1065 485 965 500C875 515 825 475 845 410Z" class="patch"/><circle cx="965" cy="415" r="8" fill="#172033"/><text x="983" y="405" class="m">phi(p)</text><text x="960" y="375" text-anchor="middle" class="m">phi(U)</text><path d="M825 525H1090M825 525V230" class="line" marker-end="url(#a)"/><text x="1090" y="555" class="m">x1</text><text x="795" y="235" class="m">x2</text><text x="600" y="642" text-anchor="middle" class="s">A chart assigns local coordinates; it does not physically flatten the manifold.</text></svg>