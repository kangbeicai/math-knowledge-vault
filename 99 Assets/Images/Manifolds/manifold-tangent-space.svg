<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc"><title id="title">Tangent spaces at different base points</title><desc id="desc">Two points on a curved manifold have differently oriented tangent spaces and tangent vectors.</desc><defs><marker id="b" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#2563eb"/></marker><marker id="o" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#ea580c"/></marker><style>.t{font:700 34px Arial,sans-serif;fill:#172033}.s{font:20px Arial,sans-serif;fill:#334155}.m{font:italic 24px Georgia,serif;fill:#172033}.curve{fill:none;stroke:#334155;stroke-width:4;stroke-linecap:round}.thin{fill:none;stroke:#94a3b8;stroke-width:2.5}</style></defs><rect width="1200" height="700" fill="white"/><text x="600" y="58" text-anchor="middle" class="t">Tangent spaces depend on the base point</text><path d="M80 410C210 210 500 205 640 405C760 575 945 515 1115 340" class="curve"/><path d="M95 450C260 325 505 335 635 470C760 595 955 555 1120 405" class="thin"/><circle cx="330" cy="315" r="9" fill="#172033"/><circle cx="850" cy="500" r="9" fill="#172033"/><text x="345" y="300" class="m">p</text><text x="865" y="490" class="m">q</text><line x1="180" y1="405" x2="490" y2="225" stroke="#2563eb" stroke-width="5"/><line x1="675" y1="620" x2="1010" y2="380" stroke="#ea580c" stroke-width="5"/><path d="M330 315L445 248" fill="none" stroke="#2563eb" stroke-width="6" marker-end="url(#b)"/><path d="M850 500L965 418" fill="none" stroke="#ea580c" stroke-width="6" marker-end="url(#o)"/><text x="210" y="250" class="m">T_p M</text><text x="985" y="570" class="m">T_q M</text><text x="460" y="235" class="m">v</text><text x="975" y="410" class="m">w</text><text x="600" y="655" text-anchor="middle" class="s">v in T_pM and w in T_qM belong to different vector spaces.</text></svg>