<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc"><title id="title">Pushforward of a tangent vector</title><desc id="desc">A smooth map sends p to F(p), while its differential sends a tangent vector v to dF_p(v).</desc><defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#334155"/></marker><marker id="b" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#2563eb"/></marker><marker id="g" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0l12 6-12 6z" fill="#059669"/></marker><style>.t{font:700 34px Arial,sans-serif;fill:#172033}.l{font:600 25px Arial,sans-serif;fill:#172033}.s{font:20px Arial,sans-serif;fill:#334155}.m{font:italic 24px Georgia,serif;fill:#172033}.line{fill:none;stroke:#334155;stroke-width:4;stroke-linecap:round}.m1{fill:#dbeafe;stroke:#2563eb;stroke-width:4}.m2{fill:#d1fae5;stroke:#059669;stroke-width:4}</style></defs><rect width="1200" height="700" fill="white"/><text x="600" y="58" text-anchor="middle" class="t">Pushforward dF_p maps tangent vectors forward</text><text x="245" y="120" text-anchor="middle" class="l">M</text><path d="M70 365C125 210 385 190 500 330C575 425 475 540 280 535C125 530 35 470 70 365Z" class="m1"/><circle cx="290" cy="380" r="8" fill="#172033"/><text x="305" y="368" class="m">p</text><line x1="170" y1="475" x2="410" y2="310" stroke="#2563eb" stroke-width="5"/><path d="M290 380L390 312" fill="none" stroke="#2563eb" stroke-width="6" marker-end="url(#b)"/><text x="390" y="300" class="m">v</text><text x="170" y="510" class="m">T_p M</text><text x="955" y="120" text-anchor="middle" class="l">N</text><path d="M710 350C770 205 1040 205 1125 360C1180 460 1065 550 900 535C760 522 665 455 710 350Z" class="m2"/><circle cx="910" cy="365" r="8" fill="#172033"/><text x="925" y="353" class="m">F(p)</text><line x1="790" y1="500" x2="1065" y2="290" stroke="#059669" stroke-width="5"/><path d="M910 365L1030 275" fill="none" stroke="#059669" stroke-width="6" marker-end="url(#g)"/><text x="1035" y="265" class="m">dF_p(v)</text><text x="790" y="535" class="m">T_F(p) N</text><path d="M500 245C610 160 690 160 790 245" class="line" marker-end="url(#a)"/><text x="645" y="150" text-anchor="middle" class="m">F</text><path d="M480 485C600 575 700 575 805 495" class="line" marker-end="url(#a)"/><text x="645" y="600" text-anchor="middle" class="m">dF_p</text><text x="600" y="655" text-anchor="middle" class="s">F maps points; dF_p maps their tangent vectors.</text></svg>